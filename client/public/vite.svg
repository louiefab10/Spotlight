<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="64" height="64">
    <defs>
        <linearGradient id="spotlightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:white;stop-opacity:0.35" />
            <stop offset="60%" style="stop-color:white;stop-opacity:0" />
        </linearGradient>

        <filter id="barShadow">
            <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.3" flood-color="black" flood-opacity="0.3"/>
        </filter>
    </defs>

    <circle cx="12" cy="12" r="12" fill="#1DB954"/>

    <g fill="#FFFFFF" transform="rotate(12 12 12)" filter="url(#barShadow)">
        <rect x="6.5" y="9.5" width="2.5" height="5" rx="1.25"/>
        <rect x="10.75" y="5.5" width="2.5" height="13" rx="1.25"/>
        <rect x="15" y="8" width="2.5" height="8" rx="1.25"/>
    </g>

    <path d="M-1,-1 L20,4 L4,20" fill="url(#spotlightGradient)" />
</svg>
